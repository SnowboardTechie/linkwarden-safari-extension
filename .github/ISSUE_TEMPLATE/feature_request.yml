name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Note that this extension aims to stay close in behavior to the [official Linkwarden browser extension](https://github.com/linkwarden/browser-extension) — features that belong upstream may be better filed there.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point. What are you trying to do today that's harder than it needs to be?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? Mockups and screenshots help.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other approaches you've thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else relevant — links to related issues, screenshots from other clients, etc.
